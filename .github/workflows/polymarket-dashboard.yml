name: Update Polymarket dashboard

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "scripts/**"
      - ".github/workflows/polymarket-dashboard.yml"
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Update Polymarket data
        run: python scripts/update_polymarket_30d.py --date "$(date -u +%F)"

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Polymarket 30-day dashboard data"
          file_pattern: "docs/data/*.csv docs/data/*.json docs/data/*.xlsx"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
