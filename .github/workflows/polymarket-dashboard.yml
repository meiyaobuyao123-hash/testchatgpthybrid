name: Update Polymarket dashboard

on:
  push:
    branches:
      - main
    paths:
      - "docs/index.html"
      - "docs/requirements.txt"
      - "scripts/**"
      - ".github/workflows/polymarket-dashboard.yml"
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Update Polymarket data
        run: python scripts/update_polymarket_30d.py --date "$(date -u +%F)"

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Polymarket 30-day dashboard data"
          file_pattern: "docs/data/*.csv docs/data/*.json docs/data/*.xlsx"

      - name: Publish static site to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/polymarket-pages
          mkdir -p /tmp/polymarket-pages
          cp -R docs/. /tmp/polymarket-pages/
          cd /tmp/polymarket-pages
          git init -b gh-pages
          git add .
          git commit -m "Deploy Polymarket dashboard"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
